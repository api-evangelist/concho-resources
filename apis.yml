description: >-
  Concho Resources, Inc. was an independent oil and natural gas company
  focused on the acquisition, development, exploration, and production of
  oil and natural gas properties primarily in the Permian Basin of West
  Texas and southeast New Mexico. On January 15, 2021, ConocoPhillips
  completed an all-stock acquisition of Concho Resources at a total
  enterprise value of $13.3 billion, retiring the Concho brand. This
  profile is preserved as a historical record; Concho no longer operates
  under this name and never published any public developer APIs.
